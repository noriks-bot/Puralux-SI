odes.","articleTemplateApplyDiscountTitle":"How do I apply promo/discount codes?","articleTemplateCancelMembershipContent":"We are happy to assist with instructions on how to cancel your subscription.\u003cbr\u003e1. Login into your account\u0026nbsp;\u003cbr\u003e\u003cstrong\u003e[here]\u003cbr\u003e\u003c/strong\u003e2. Click Subscriptions\u003cbr\u003e3. Locate your subscription and click \u003cbr\u003e\u003cstrong\u003e[Manage]\u003cbr\u003e\u003c/strong\u003e4. Click \u003cstrong\u003e[Cancel Subscription]\u003c/strong\u003e. \u003cbr\u003eProceed to complete the steps to successfully cancel your subscription.\u003cbr\u003e","articleTemplateCancelMembershipExcerpt":"Learn how to cancel your membership.","articleTemplateCancelMembershipTitle":"How do I cancel my membership/subscription?","articleTemplateCancellationPolicyContent":"Orders can be canceled within \u003cstrong\u003e[XX]\u003c/strong\u003e hours. \u003cbr\u003ePlease visit our \u003cbr\u003e\u003cstrong\u003e[link to Order Management portal]\u003c/strong\u003e to request a cancellation as soon as possible.\u003cbr\u003eYou will receive confirmation of your cancellation if we’re able to make it happen. \u003cbr\u003eAfter this period, we may not be able to cancel your order as it might already be in processing or shipment. \u003cbr\u003eIf you have already received an order confirmation email, it may be impossible to cancel your order. However, you can always request a return or exchange once your order arrives. \u003cbr\u003e","articleTemplateCancellationPolicyExcerpt":"Learn when and how you can cancel an order.","articleTemplateCancellationPolicyTitle":"What is your cancellation policy?","articleTemplateDamagedItemContent":"We’re sorry your item(s) have damage! \u003cbr\u003eSome items break during shipment. We’ll do our best to help.\u003cbr\u003ePlease report your order issue in our \u003cbr\u003e\u003cstrong\u003e[link to live Order Management portal]\u003c/strong\u003e for further assistance.\u003cstrong\u003e \u003c/strong\u003ePlease include an image of the damage. \u003cbr\u003eWhile we may not be able to guarantee your exact order is replaced due to potential stock issues, we’ll be sure to resolve the situation!\u003cbr\u003e","articleTemplateDamagedItemExcerpt":"Learn what to do when your order arrives damaged.","articleTemplateDamagedItemTitle":"What do I do if my item(s) arrives damaged?","articleTemplateEditOrderContent":"Once an order is placed, we are unable to make changes to the order. However, if you need to update your shipping address or contact information, please contact our customer service team immediately after placing your order.","articleTemplateEditOrderExcerpt":"Learn when and how you can make changes to a recent order.","articleTemplateEditOrderTitle":"Can I edit or add anything to my order?","articleTemplateExpeditedShippingContent":"Yes, we do offer expedited shipping for domestic orders only for \u003cstrong\u003e[$##]\u003c/strong\u003e. \u003cbr\u003ePlease keep in mind that the order processing can take up to \u003cbr\u003e\u003cstrong\u003e[## of hours]\u003c/strong\u003e.","articleTemplateExpeditedShippingExcerpt":"Learn about the availability of faster shipping options.","articleTemplateExpeditedShippingTitle":"Do you offer expedited shipping?","articleTemplateFreeShippingContent":"We offer fast and free shipping for orders over $\u003cstrong\u003e[##]\u003c/strong\u003e within the contiguous United States (does not include Hawaii, Alaska, or US territories). \u003cbr\u003eOrders shipped outside of the United States are subject to taxes and duties that are paid for by the customer.\u003cbr\u003e","articleTemplateFreeShippingExcerpt":"Learn about the availability of free shipping.","articleTemplateFreeShippingTitle":"Do you offer free shipping?","articleTemplateHowLongDeliveryContent":"Delivery times vary depending on the destination and the shipping method selected. \u003cbr\u003e• Standard Delivery: Typically arrives within \u003cbr\u003e\u003cstrong\u003e[XX]\u003c/strong\u003e business days.\u003cbr\u003e• Express Delivery: Typically arrives within \u003cbr\u003e\u003cstrong\u003e[XX]\u003c/strong\u003e business days.\u003cbr\u003e• Premium Delivery: Typically arrives within \u003cbr\u003e\u003cstrong\u003e[XX]\u003c/strong\u003e business days.\u003cbr\u003e• International Delivery: Typically arrives within \u003cbr\u003e\u003cstrong\u003e[XX]\u003c/strong\u003e business days.\u003cbr\u003e","articleTemplateHowLongDeliveryExcerpt":"Learn how long shipments take to arrive.","articleTemplateHowLongDeliveryTitle":"How long does delivery take?","articleTemplateHowToCancelOrderContent":"\u003cp\u003eYou will have the option to cancel your order in your confirmation email. You can also contact our customer services team on \u003cb\u003e[email/phone #]\u003c/b\u003e. Please include your order number and the reason for cancellation in your message.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eOrders can only be cancelled before they have been dispatched. If your order has already been dispatched, please see our returns policy for further instructions.\u003c/p\u003e","articleTemplateHowToCancelOrderExcerpt":"\u003cp\u003eYou will have the option to cancel your order in your confirmation email. You can also contact our customer services team on \u003cb\u003e[email/phone #]\u003c/b\u003e. Please include your order number and the reason for cancellation in your message.\u003c/p\u003e","articleTemplateHowToCancelOrderTitle":"How do I cancel my order?","articleTemplateHowToReturnContent":"\u003cp\u003eReturns must be initiated within \u003cb\u003e[x days]\u003c/b\u003e of receiving your order. Items must be unused and in their original packaging.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eReturn by mail\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eContact our customer service team on \u003cb\u003e[email or phone #]\u003c/b\u003e to initiate the return process with your order number and details of the item you wish to return. Print the return label and deliver your return to a \u003cb\u003e[Fedex/shipping center]\u003c/b\u003e location.\u003c/p\u003e\\n\u003cp\u003eNote: A \u003cb\u003e[£X]\u003c/b\u003e shipping charge applies per order.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eReturn in store\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eYou can visit any of our retail stores and present your order confirmation or packing slip as proof of purchase. All items must have the original tags attached.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eRefund process\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eUpon receipt of the returned item, we will examine it to ensure that it meets our return policy criteria. If the return is approved, a refund will be issued to the original method of payment.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eNon-returnable items\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eCertain items may not be eligible for return due to hygiene, final sale, or other reasons. These items will be clearly marked on the product page.\u003c/p\u003e","articleTemplateHowToReturnExcerpt":"\u003cp\u003eReturns must be initiated within \u003cb\u003e[x days]\u003c/b\u003e of receiving your order. Items must be unused and in their original packaging.\u003c/p\u003e","articleTemplateHowToReturnTitle":"How do I make a return?","articleTemplateHowToTrackOrderContent":"\u003cp\u003eOnce your order has been placed and processed, you will receive a confirmation email with your order details. This email will include a tracking number and a link to our tracking page.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003e\u003cb\u003eClick on the tracking number link or enter the tracking number on our tracking page.\u003c/b\u003e\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eTracking information may not be immediately available after your order is placed. It can take up to \u003cb\u003e[X hours]\u003c/b\u003e for the number to become active in our system. If you don't see any updates right away, please be patient and check back later.\u003c/p\u003e","articleTemplateHowToTrackOrderExcerpt":"\u003cp\u003eOnce your order has been placed and processed, you will receive a confirmation email with your order details. This email will include a tracking number and a link to our tracking page.\u003c/p\u003e","articleTemplateHowToTrackOrderTitle":"How do I track my order?","articleTemplateLoginIssueContent":"Sorry about that. Please make sure you’ve \u003cstrong\u003e[created your account]\u003c/strong\u003e and then \u003cstrong\u003e[activate your account]\u003c/strong\u003e to log in to the new site. You should have gotten an email from us to activate the account. \u003cbr\u003eNeed to resend the email? Click here: \u003cbr\u003e\u003cstrong\u003e[Link to resend email]\u003c/strong\u003e","articleTemplateLoginIssueExcerpt":"Learn how to log into your account.","articleTemplateLoginIssueTitle":"I'm having trouble logging in","articleTemplateMissingDeliveryContent":"If no one was home at the time of delivery, the carrier will leave the package in a safe location. \u003cbr\u003eBe sure to check around your home and with neighbors/building management who may have collected the package for you.\u003cbr\u003eAlso, please double-check the shipping address of your order to ensure it’s headed to the right location. \u003cbr\u003eOn some occasions, packages may be marked as delivered but take additional time to arrive.\u003cbr\u003eIf you still are unable to locate the package, please reach out to the carrier. \u003cbr\u003eIf you need additional assistance, please \u003cbr\u003e\u003ca href=\"https://www.loveinfaith.life/pages/contact-us\"\u003er\u003c/a\u003eeport your order issue in our \u003cstrong\u003e[Order Management portal]\u003c/strong\u003e for further assistance.","articleTemplateMissingDeliveryExcerpt":"Learn what to do if your package is missing after being marked delivered.","articleTemplateMissingDeliveryTitle":"My order was marked delivered but it’s not here!","articleTemplatePackageLostOrDamagedContent":"\u003ch3\u003e\u003cb\u003eLost packages\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eAt \u003cb\u003e[your brand name]\u003c/b\u003e, we strive to ensure every order reaches you in perfect condition. In the event that your order is lost in transit, please contact our customer service team on \u003cb\u003e[email or phone number]\u003c/b\u003e with your order number and all relevant details.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eDamaged packages\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eWe understand the disappointment of receiving a damaged package. In such cases, please contact our customer service team on \u003cb\u003e[email or phone #]\u003c/b\u003e within \u003cb\u003e[x hours]\u003c/b\u003e of receiving your order and include photos of the damaged items or package.\u003c/p\u003e\\n\u003cp\u003eWe will review the documentation provided and arrange a replacement or refund if appropriate.\u003c/p\u003e","articleTemplatePackageLostOrDamagedExcerpt":"\u003cp\u003eAt \u003cb\u003e[your brand name]\u003c/b\u003e, we strive to ensure every order reaches you in perfect condition. In the event that your order is lost in transit, please contact our customer service team on \u003cb\u003e[email or phone number]\u003c/b\u003e with your order number and all relevant details.\u003c/p\u003e","articleTemplatePackageLostOrDamagedTitle":"What happens if my package is lost or arrives in a damaged state?","articleTemplateRefundPolicyContent":"Our return policy allows returns or exchanges for \u003cstrong\u003e[condition of product (e.g. unopened)]\u003c/strong\u003e products purchased in the last \u003cstrong\u003e[##]\u003c/strong\u003e days. \u003cbr\u003ePlease note that \u003cbr\u003e\u003cstrong\u003e[perishable / discounted / limited edition] \u003c/strong\u003eitems are not eligible for return.\u003cbr\u003eYou can expect your return to be processed within \u003cbr\u003e\u003cstrong\u003e[XX]\u003c/strong\u003e business days or less of our returns department receiving it.\u003cbr\u003eIf you'd like to start a return, please visit our Return Portal [\u003cbr\u003e\u003cstrong\u003elink to return portal]\u003c/strong\u003e.\u0026nbsp;","articleTemplateRefundPolicyExcerpt":"Learn when we do (and don’t) allow returns.","articleTemplateRefundPolicyTitle":"What’s your return policy?","articleTemplateRefundTimingContent":"Once your return has been received and processed, you will be notified via email when the refund has been issued. \u003cbr\u003ePlease allow \u003cbr\u003e\u003cstrong\u003e[##] \u003c/strong\u003ebusiness days for the refund to reflect in your account.","articleTemplateRefundTimingExcerpt":"Learn how long refunds take to process.","articleTemplateRefundTimingTitle":"When will I get my refund?","articleTemplateRefundsOrExchangesContent":"\u003cp\u003e\u003cb\u003e[’Yes’ answer]\u003c/b\u003e\u003c/p\u003e\\n\u003cp\u003eYes, we offer refunds and exchanges within \u003cb\u003e[# of days]\u003c/b\u003e days of purchase. To be eligible for a refund or exchange, items must be returned in their original condition, with all tags and packaging intact. Please note that \u003cb\u003e[any exceptions, e.g., sale items, refurbished products]\u003c/b\u003e are not eligible.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eTo return or exchange an item, please contact customer services on \u003cb\u003e[email/phone #]\u003c/b\u003e. Refunds will be processed back to the original method of payment within \u003cb\u003e[# of days]\u003c/b\u003e days of receiving the returned item.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003e\u003cb\u003e[’No’ answer]\u003c/b\u003e\u003c/p\u003e\\n\u003cp\u003eUnfortunately, we are unable to offer refunds or exchanges after a purchase has been made. This policy is due to the nature of our products, which include \u003cb\u003e[mention specific types of products, e.g. perishable, bespoke, digital, etc]\u003c/b\u003e.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eHowever, we are committed to ensuring customer satisfaction. If you receive a damaged or incorrect item, please contact us immediately on \u003cb\u003e[email/phone #]\u003c/b\u003e. We will review the situation and strive to resolve the issue, which may include a replacement, discount, or store credit.\u003c/p\u003e","articleTemplateRefundsOrExchangesExcerpt":"\u003cp\u003eYes, we offer refunds and exchanges within \u003cb\u003e[number of days]\u003c/b\u003e days of purchase. To be eligible for a refund or exchange, items must be returned in their original condition, with all tags and packaging intact. Please note that \u003cb\u003e[any exceptions, e.g., sale items, refurbished products]\u003c/b\u003e are not eligible.\u003c/p\u003e","articleTemplateRefundsOrExchangesTitle":"Do you offer refunds or exchanges?","articleTemplateRewardsContent":"To use your rewards points, copy the code that we emailed you and proceed to checkout. Enter your code in the \u003cstrong\u003e['Discount Code']\u003c/strong\u003e field. \u003cbr\u003eClick \u003cbr\u003e\u003cstrong\u003e['Apply']\u003c/strong\u003e to see your new total before finalizing your order. Only one code can be used per order. \u003cbr\u003eIf you've received \u003cbr\u003e\u003cstrong\u003e[a referral link]\u003c/strong\u003e, you may not see your discount right away, but don't worry. Once you add products to your cart, you'll see the \u003cstrong\u003e[##%]\u003c/strong\u003e discount applied at checkout. Be sure to double-check it has been applied before paying.","articleTemplateRewardsExcerpt":"Learn how to redeem your rewards points.","articleTemplateRewardsTitle":"How do I use my benefits/rewards points?","articleTemplateShippingCostContent":"\u003cstrong\u003eDomestic Shipping [Country]: \u003c/strong\u003eWe offer free standard shipping on orders over \u003cstrong\u003e[$##]\u003c/strong\u003e USD. We also offer expedited shipping for \u003cstrong\u003e[$##]\u003c/strong\u003e.\u003cbr\u003e\u003cstrong\u003eCanadian Shipping: \u003c/strong\u003eWe offer free standard shipping to Canada on orders over \u003cstrong\u003e[$##]\u003c/strong\u003e USD or around \u003cstrong\u003e[$##]\u003c/strong\u003e CAD, which can vary based on the exchange rate. Faster Canadian shipping is available for \u003cstrong\u003e[$##]\u003c/strong\u003e USD on orders over \u003cstrong\u003e[$##]\u003c/strong\u003e USD. \u003cbr\u003e\u003cstrong\u003eUK \u0026amp; EU: \u003c/strong\u003eFree shipping is available for UK and EU for orders over \u003cstrong\u003e[€##]\u003c/strong\u003e. For orders under that amount, fees are calculated at checkout.\u003cbr\u003e\u003cstrong\u003eInternational Shipping: \u003c/strong\u003eInternational shipping cost is \u003cstrong\u003e[$##]\u003c/strong\u003e USD for \u003cstrong\u003e[Countries you ship to]\u003c/strong\u003e.\u003cbr\u003eUnfortunately, we do not ship to the following countries: \u003cbr\u003e\u003cstrong\u003e[Countries you do not ship to]\u003c/strong\u003e.","articleTemplateShippingCostExcerpt":"Learn the cost of shipping for various locations and items.","articleTemplateShippingCostTitle":"How much does shipping cost?","articleTemplateShippingPolicyContent":"\u003cp\u003e\u003cb\u003e[No international shipping]\u003c/b\u003e\u003c/p\u003e\\n\u003cp\u003eOur standard delivery time within \u003cb\u003e[country/region]\u003c/b\u003e is \u003cb\u003e[# of days]\u003c/b\u003e working days.\u003c/p\u003e\\n\u003cp\u003eShipping charges, if applicable, will be calculated and displayed at checkout. Please note that delivery times may vary depending on your location and the time of year.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eCurrently, we do not offer international shipping, but we are working to provide this service in the future.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eIf you have any further questions about our shipping policy, please contact us at \u003cb\u003e[email/phone #]\u003c/b\u003e.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003e\u003cb\u003e[International shipping included]\u003c/b\u003e\u003c/p\u003e\\n\u003cp\u003eOur standard shipping time within \u003cb\u003e[country/region]\u003c/b\u003e is \u003cb\u003e[# of days]\u003c/b\u003e working days.\u003c/p\u003e\\n\u003cp\u003eFor international orders, expect a shipping time of \u003cb\u003e[# of days]\u003c/b\u003e working days.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eShipping fees, if applicable, will be calculated and displayed at checkout. Please note that delivery times may vary depending on your location and the time of year.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eIf you have any further questions about our shipping policy, please contact us at \u003cb\u003e[email/phone #]\u003c/b\u003e.\u003c/p\u003e","articleTemplateShippingPolicyExcerpt":"\u003cp\u003eOur standard delivery time within \u003cb\u003e[country/region]\u003c/b\u003e is \u003cb\u003e[number of days]\u003c/b\u003e working days.\u003c/p\u003e\\n\u003cp\u003eShipping charges, if applicable, will be calculated and displayed at checkout. Please note that delivery times may vary depending on your location and the time of year.\u003c/p\u003e","articleTemplateShippingPolicyTitle":"What is your shipping policy?","articleTemplateSkipShipmentContent":"We are happy to assist with instructions on how to cancel your subscription.\u003cbr\u003e1. Login into your account\u0026nbsp;\u003cbr\u003e\u003cstrong\u003e[here]\u003cbr\u003e\u003c/strong\u003e2. Click Subscriptions\u003cbr\u003e3. Locate your subscription and click \u003cbr\u003e\u003cstrong\u003e[Manage]\u003cbr\u003e\u003c/strong\u003e4. Click [Skip Shipment]. \u003cbr\u003eProceed to complete the steps to successfully cancel your subscription.\u003cbr\u003e","articleTemplateSkipShipmentExcerpt":"Learn how to skip a shipment in your subscription.","articleTemplateSkipShipmentTitle":"How do I skip a subscription shipment?","articleTemplateStartReturnContent":"Our return policy allows returns for \u003cstrong\u003e[condition of product (e.g. unopened)]\u003c/strong\u003e products purchased in the last \u003cstrong\u003e[##]\u003c/strong\u003e days. \u003cbr\u003eIf you'd like to proceed with a return, please visit our Return Portal [\u003cbr\u003e\u003cstrong\u003elink to return portal]\u003c/strong\u003e.\u0026nbsp;\u003cbr\u003eOnce your request is approved, you will receive a prepaid return label via email. All returns must be approved and processed with our company-issued return shipping label to ensure proper tracking and processing of the return.\u0026nbsp;\u003cbr\u003ePlease note that \u003cbr\u003e\u003cstrong\u003e[perishable / discounted / limited edition] \u003c/strong\u003eitems are not eligible for return.\u003cbr\u003eYou can expect your return to be processed within \u003cbr\u003e\u003cstrong\u003e[XX]\u003c/strong\u003e business days or less of our returns department receiving it.","articleTemplateStartReturnExcerpt":"Learn how to start a return request.","articleTemplateStartReturnTitle":"How do I start a return?","articleTemplateTrackOrderContent":"Once your order has been placed and processed, you will receive a confirmation email with your order details. This email will include a tracking number and a link to our tracking page.\u003cbr\u003eTracking information may not be immediately available after your order is placed. It can take up to \u003cbr\u003e\u003cstrong\u003e[X days]\u003c/strong\u003e for the number to become active in our system. If you don't see any updates right away, please be patient and check back later.\u003cbr\u003e\u003cstrong\u003e[X days] \u003c/strong\u003eafter placing your order, you can click the tracking number link in the email or track your order on our website here [\u003cstrong\u003elink to Order Management: Track Order\u003c/strong\u003e].","articleTemplateTrackOrderExcerpt":"Learn how to track the status of your order after it's been placed.","articleTemplateTrackOrderTitle":"How do I track my order?","articleTemplateUpdateSubscriptionContent":"We are happy to assist with instructions on how to cancel your subscription.\u003cbr\u003e1. Login into your account\u0026nbsp;\u003cbr\u003e\u003cstrong\u003e[here]\u003cbr\u003e\u003c/strong\u003e2. Click Subscriptions\u003cbr\u003e3. Locate your subscription and click \u003cbr\u003e\u003cstrong\u003e[Manage]\u003cbr\u003e\u003c/strong\u003e4. Click \u003cstrong\u003e[Change Items]\u003c/strong\u003e. Proceed to complete the steps to successfully cancel your subscription.","articleTemplateUpdateSubscriptionExcerpt":"Learn how to change the items in your subscription.","articleTemplateUpdateSubscriptionTitle":"How do I update my subscription items?","articleTemplateWorldwideShippingContent":"We do ship to most countries, however, there are a few that we are unable to send to. \u003cbr\u003eTo review the countries we currently don't ship to, please see below:\u003cbr\u003e\u003cstrong\u003e[Countries where you don’t ship.]\u003cbr\u003e\u003c/strong\u003ePlease note that international shipments can take \u003cstrong\u003e[XX] days\u003c/strong\u003e. \u003cbr\u003eIf you have been waiting for more than \u003cbr\u003e\u003cstrong\u003e[XX] \u003c/strong\u003edays to your order, please get in touch with our team so we can investigate the issue.","articleTemplateWorldwideShippingExcerpt":"Learn where we ship orders.","articleTemplateWorldwideShippingTitle":"Do you ship worldwide?","articleTemplateWrongItemContent":"We are sorry to hear you received the wrong item in your order! \u003cbr\u003ePlease report your order issue in our \u003cbr\u003e\u003cstrong\u003e[link to live Order Management portal] \u003c/strong\u003efor further assistance.\u003cbr\u003eInclude a photo of the item received and the name of the missing item(s). Please double-check the package for any notes or packing slips that indicate your other i egories","allArticlesPageNoCategorySectionTitle":"Other articles","alreadySignedInWith":"You are signed in as \u003cbold\u003e{{emailOrPhone}}\u003c/bold\u003e.","articleLanguageFallbackWarningText":"This article is not available in English.","articleListArticleLinkLabel":"Read more","articleRatingQuestion":"Was this article helpful?","articleTOCHideButtonLabel":"Hide","articleTemplateApplyDiscountContent":"To apply a promo or discount code:\u003cbr\u003e• Proceed to checkout and enter your code in the \u003cstrong\u003e['Discount Code']\u003c/strong\u003e field. \u003cbr\u003e• Click \u003cstrong\u003e['Apply']\u003c/strong\u003e to see your new total before finalizing your order.\u003cbr\u003e• Only one code can be used per order.\u003cbr\u003eIf you’re having trouble entering your promo code, please try clearing the cache on your web browser or trying on a different device.","articleTemplateApplyDiscountExcerpt":"Learn how to apply discount codes.","articleTemplateApplyDiscountTitle":"How do I apply promo/discount codes?","articleTemplateCancelMembershipContent":"We are happy to assist with instructions on how to cancel your subscription.\u003cbr\u003e1. Login into your account \u003cstrong\u003e[Link to login page]\u003c/strong\u003e\u003cbr\u003e2. Click \u003cstrong\u003e[Subscriptions]\u003c/strong\u003e\u003cbr\u003e3. Locate your subscription and click \u003cstrong\u003e[Manage]\u003c/strong\u003e\u003cbr\u003e4. Click \u003cstrong\u003e[Cancel Subscription]\u003c/strong\u003e. \u003cbr\u003eProceed to complete the steps to successfully cancel your subscription.","articleTemplateCancelMembershipExcerpt":"Learn how to cancel your membership.","articleTemplateCancelMembershipTitle":"How do I cancel my membership/subscription?","articleTemplateCancellationPolicyContent":"Orders can be canceled within \u003cstrong\u003e[X hours]\u003c/strong\u003e. \u003cbr\u003ePlease email our team with your cancellation request as soon as possible.\u003cbr\u003eYou will receive confirmation of your cancellation if we’re able to make it happen. \u003cbr\u003eAfter this period, we may not be able to cancel your order as it might already be in processing or shipment. \u003cbr\u003eIf you have already received an order confirmation email, it may be impossible to cancel your order. However, you can always request a return or exchange once your order arrives.","articleTemplateCancellationPolicyExcerpt":"Learn when and how you can cancel an order.","articleTemplateCancellationPolicyTitle":"What is your cancellation policy?","articleTemplateDamagedItemContent":"We’re sorry your item(s) have damage! \u003cbr\u003eSome items break during shipment. We’ll do our best to help.\u003cbr\u003ePlease email our team with an image of your damaged item for further assistance.\u003cbr\u003eWhile we may not be able to guarantee your exact order is replaced due to potential stock issues, we’ll be sure to resolve the situation as best we can!\u003cbr\u003e","articleTemplateDamagedItemExcerpt":"Learn what to do when your order arrives damaged.","articleTemplateDamagedItemTitle":"What do I do if my item(s) arrives damaged?","articleTemplateEditOrderContent":"Once an order is placed, we are unable to make changes to the order. However, if you need to update your shipping address or contact information, please contact our customer service team immediately after placing your order.","articleTemplateEditOrderExcerpt":"Learn when and how you can make changes to a recent order.","articleTemplateEditOrderTitle":"Can I edit or add anything to my order?","articleTemplateExpeditedShippingContent":"Yes, we do offer expedited shipping for domestic orders only for \u003cstrong\u003e[$X]\u003c/strong\u003e. \u003cbr\u003ePlease keep in mind that the order processing can take up to \u003cstrong\u003e[# of hours]\u003c/strong\u003e.","articleTemplateExpeditedShippingExcerpt":"Learn about the availability of faster shipping options.","articleTemplateExpeditedShippingTitle":"Do you offer expedited shipping?","articleTemplateFreeShippingContent":"We offer fast and free shipping for orders over \u003cstrong\u003e[$X]\u003c/strong\u003e within the contiguous United States (does not include Hawaii, Alaska, or US territories). \u003cbr\u003eOrders shipped outside the United States are subject to taxes and duties that are paid for by the customer.","articleTemplateFreeShippingExcerpt":"Learn about the availability of free shipping.","articleTemplateFreeShippingTitle":"Do you offer free shipping?","articleTemplateHowLongDeliveryContent":"Delivery times vary depending on the destination and the shipping method selected. \u003cbr\u003e• Standard Delivery: Typically arrives within \u003cstrong\u003e[X days]\u003c/strong\u003e business days.\u003cbr\u003e• Express Delivery: Typically arrives within \u003cstrong\u003e[X days]\u003c/strong\u003e business days.\u003cbr\u003e• Premium Delivery: Typically arrives within \u003cstrong\u003e[X days]\u003c/strong\u003e business days.\u003cbr\u003e• International Delivery: Typically arrives within \u003cstrong\u003e[X days]\u003c/strong\u003e business days.","articleTemplateHowLongDeliveryExcerpt":"Learn how long shipments take to arrive.","articleTemplateHowLongDeliveryTitle":"How long does delivery take?","articleTemplateHowToCancelOrderContent":"\u003cp\u003eYou will have the option to cancel your order within your confirmation email. You may also contact our customer service team at \u003cb\u003e[email/phone #]\u003c/b\u003e. Please include your order number and the reason for cancellation in your message.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eOrders can only be canceled before they have been dispatched. If your order has already been shipped, please refer to our return policy for further instructions.\u003c/p\u003e","articleTemplateHowToCancelOrderExcerpt":"\u003cp\u003eYou will have the option to cancel your order within your confirmation email. You may also contact our customer service team at \u003cb\u003e[email/phone #]\u003c/b\u003e. Please include your order number and the reason for cancellation in your message.\u003c/p\u003e","articleTemplateHowToCancelOrderTitle":"How do I cancel my order?","articleTemplateHowToReturnContent":"\u003cp\u003eReturns must be initiated within \u003cb\u003e[x days]\u003c/b\u003e of receiving your order. Items must be unused and in the original packaging.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eReturn by mail\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eReach out to our customer support team at \u003cb\u003e[email or phone #]\u003c/b\u003e to initiate the return process with your order number and details about the item you wish to return. Print the shipping label and drop off your return at a \u003cb\u003e[Fedex/shipping center]\u003c/b\u003e location.\u003c/p\u003e\\n\u003cp\u003eNote: There is a \u003cb\u003e[$X]\u003c/b\u003e shipping charge per order.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eReturn in store\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eYou can visit any of our retail stores and present your order confirmation or packing slip as proof of purchase. All items must have the original tags attached.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eRefund process\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eUpon receiving the returned item, we will inspect it to ensure it meets our return policy criteria. If the return is approved, a refund will be processed to the original payment method.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eNon-Returnable items\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eCertain items may not be eligible for return due to hygiene, final sale, or other reasons. These items will be clearly marked on the product page.\u003c/p\u003e","articleTemplateHowToReturnExcerpt":"\u003cp\u003eReturns must be initiated within \u003cb\u003e[x days]\u003c/b\u003e of receiving your order. Items must be unused and in the original packaging.\u003c/p\u003e","articleTemplateHowToReturnTitle":"How do I make a return?","articleTemplateHowToTrackOrderContent":"\u003cp\u003eOnce your order has been placed and processed, you will receive a confirmation email with your order details. This email will include a tracking number and a link to our tracking page.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003e\u003cb\u003eClick on the tracking number link or enter the tracking number into our tracking page.\u003c/b\u003e\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eTracking information may not be immediately available after your order is placed. It can take up to \u003cb\u003e[X hours]\u003c/b\u003e for the number to become active in our system. If you don't see any updates right away, please be patient and check back later.\u003c/p\u003e","articleTemplateHowToTrackOrderExcerpt":"\u003cp\u003eOnce your order has been placed and processed, you will receive a confirmation email with your order details. This email will include a tracking number and a link to our tracking page.\u003c/p\u003e","articleTemplateHowToTrackOrderTitle":"How do I track my order?","articleTemplateLoginIssueContent":"Sorry about that. Please make sure you’ve \u003cstrong\u003e[created your account]\u003c/strong\u003e and then \u003cstrong\u003e[activate your account]\u003c/strong\u003e to log in to the new site. You should have gotten an email from us to activate the account. \u003cbr\u003eNeed to resend the email? Click here: \u003cstrong\u003e[Link to resend email]\u003c/strong\u003e","articleTemplateLoginIssueExcerpt":"Learn how to log into your account.","articleTemplateLoginIssueTitle":"I'm having trouble logging in","articleTemplateMissingDeliveryContent":"If no one was home at the time of delivery, the carrier will leave the package in a safe location.\u003cbr\u003eBe sure to check around your home and with neighbors/building management who may have collected the package for you.\u003cbr\u003eAlso, please double-check the shipping address of your order (in the order confirmation email) to ensure it’s headed to the right location. \u003cbr\u003eOn some occasions, packages may be marked as delivered but take additional time to arrive.\u003cbr\u003eIf you still are unable to locate the package, please reach out to the carrier. \u003cbr\u003eIf you need additional assistance, please email our team.","articleTemplateMissingDeliveryExcerpt":"Learn what to do if your package is missing after being marked delivered.","articleTemplateMissingDeliveryTitle":"My order was marked delivered but it’s not here.","articleTemplatePackageLostOrDamagedContent":"\u003ch3\u003e\u003cb\u003eLost packages\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eAt \u003cb\u003e[your brand name]\u003c/b\u003e, we strive to ensure every order reaches you in perfect condition. In the event that your order is lost during transit, please reach out to our customer support team at \u003cb\u003e[email or phone #]\u003c/b\u003e with your order number and any relevant details.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003ch3\u003e\u003cb\u003eDamaged packages\u003c/b\u003e\u003c/h3\u003e\\n\u003cp\u003eWe understand the disappointment of receiving a damaged package. In such instances, please report to our customer support team at \u003cb\u003e[email or phone #]\u003c/b\u003e within \u003cb\u003e[X hours]\u003c/b\u003e of receiving the order and include photos of the damaged items or package.\u003c/p\u003e\\n\u003cp\u003eWe will review the provided documentation and, if necessary, arrange for a replacement or issue a refund.\u003c/p\u003e","articleTemplatePackageLostOrDamagedExcerpt":"\u003cp\u003eAt \u003cb\u003e[your brand name]\u003c/b\u003e, we strive to ensure every order reaches you in perfect condition. In the event that your order is lost during transit, please reach out to our customer support team at \u003cb\u003e[email or phone #]\u003c/b\u003e with your order number and any relevant details.\u003c/p\u003e","articleTemplatePackageLostOrDamagedTitle":"What if my package gets lost or arrives damaged?","articleTemplateRefundPolicyContent":"Our return policy allows returns or exchanges for \u003cstrong\u003e[condition of product (e.g. unopened)]\u003c/strong\u003e products purchased in the last \u003cstrong\u003e[X days]\u003c/strong\u003e. \u003cbr\u003ePlease note that \u003cstrong\u003e[perishable / discounted / limited edition] \u003c/strong\u003eitems are not eligible for return.\u003cbr\u003eYou can expect your refund to be processed within \u003cstrong\u003e[X days]\u003c/strong\u003e business days or fewer, after our returns department receives the returned item.\u003cbr\u003eIf you'd like to start a return, please visit our Return Portal \u003cstrong\u003e[link to return portal]\u003c/strong\u003e.","articleTemplateRefundPolicyExcerpt":"Learn when we do (and don’t) allow returns.","articleTemplateRefundPolicyTitle":"What’s your return policy?","articleTemplateRefundTimingContent":"Once your return has been received and processed, you will be notified via email when the refund has been issued. \u003cbr\u003ePlease allow \u003cstrong\u003e[X days] \u003c/strong\u003ebusiness days for the refund to reflect in your account.","articleTemplateRefundTimingExcerpt":"Learn how long refunds take to process.","articleTemplateRefundTimingTitle":"When will I get my refund?","articleTemplateRefundsOrExchangesContent":"\u003cp\u003e\u003cb\u003e[’Yes’ answer]\u003c/b\u003e\u003c/p\u003e\\n\u003cp\u003eYes, we offer refunds and exchanges within \u003cb\u003e[# of days]\u003c/b\u003e days of purchase. To be eligible for a refund or exchange, items must be returned in their original condition, with all tags and packaging intact. Please note that \u003cb\u003e[any exceptions, e.g., sale items, refurbished products]\u003c/b\u003e are not eligible.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eFor returns or exchanges, please contact our customer support at \u003cb\u003e[email/phone #]\u003c/b\u003e. Refunds will be processed to the original payment method within \u003cb\u003e[# of days]\u003c/b\u003e days of receiving the returned item.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003e\u003cb\u003e[’No’ answer]\u003c/b\u003e\u003c/p\u003e\\n\u003cp\u003eUnfortunately, we are unable to offer refunds or exchanges after a purchase has been made. This policy is due to the nature of our products, which include \u003cb\u003e[mention specific types of products, e.g. perishable, custom, digital, etc.]\u003c/b\u003e.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eHowever, we are committed to ensuring customer satisfaction. If you receive a damaged or incorrect item, please contact us immediately at \u003cb\u003e[email/phone #]\u003c/b\u003e. We will review the situation and strive to resolve the issue, which may include a replacement, discount, or store credit.\u003c/p\u003e","articleTemplateRefundsOrExchangesExcerpt":"\u003cp\u003eYes, we offer refunds and exchanges within \u003cb\u003e[# of days]\u003c/b\u003e days of purchase. To be eligible for a refund or exchange, items must be returned in their original condition, with all tags and packaging intact. Please note that \u003cb\u003e[any exceptions, e.g., sale items, refurbished products]\u003c/b\u003e are not eligible.\u003c/p\u003e","articleTemplateRefundsOrExchangesTitle":"Do you offer refunds or exchanges?","articleTemplateRewardsContent":"To use your rewards points, copy the code that we shared with you and proceed to checkout. Enter your code in the \u003cstrong\u003e['Discount Code']\u003c/strong\u003e field. \u003cp\u003eClick \u003cstrong\u003e['Apply']\u003c/strong\u003e to see your new total before finalizing your order. Only one code can be used per order. \u003cp\u003eIf you've received \u003cstrong\u003e[a referral link]\u003c/strong\u003e, you may not see your discount right away, but don't worry. Once you add products to your cart, you'll see the \u003cstrong\u003e[X%]\u003c/strong\u003e discount applied at checkout. Be sure to double-check it has been applied before paying.","articleTemplateRewardsExcerpt":"Learn how to redeem your rewards points.","articleTemplateRewardsTitle":"How do I use my benefits/rewards points?","articleTemplateShippingCostContent":"\u003cstrong\u003eDomestic Shipping [Country]: \u003c/strong\u003eWe offer free standard shipping on orders over \u003cstrong\u003e[$X]\u003c/strong\u003e. We also offer expedited shipping for \u003cstrong\u003e[$X]\u003c/strong\u003e.\u003cbr\u003e\u003cstrong\u003eCanadian Shipping: \u003c/strong\u003eWe offer free standard shipping to Canada on orders over \u003cstrong\u003e[$X]\u003c/strong\u003e or about \u003cstrong\u003e[X CAD]\u003c/strong\u003e, which can vary based on the exchange rate. Faster Canadian shipping is available for \u003cstrong\u003e[$X]\u003c/strong\u003e on orders over \u003cstrong\u003e[$X]\u003c/strong\u003e. \u003cbr\u003e\u003cstrong\u003eUK \u0026amp; EU: \u003c/strong\u003eFree shipping is available for UK and EU for orders over \u003cstrong\u003e[X€]\u003c/strong\u003e. For orders under that amount, fees are calculated at checkout.\u003cbr\u003e\u003cstrong\u003eInternational Shipping: \u003c/strong\u003eInternational shipping cost is \u003cstrong\u003e[$X]\u003c/strong\u003e for \u003cstrong\u003e[Countries you ship to]\u003c/strong\u003e.\u003cbr\u003eUnfortunately, we do not ship to the following countries: \u003cbr\u003e\u003cstrong\u003e[Countries you do not ship to]\u003c/strong\u003e.","articleTemplateShippingCostExcerpt":"Learn the cost of shipping for various locations and items.","articleTemplateShippingCostTitle":"How much does shipping cost?","articleTemplateShippingPolicyContent":"\u003cp\u003e\u003cb\u003e[No international shipping]\u003c/b\u003e\u003c/p\u003e\\n\u003cp\u003eOur standard shipping time within \u003cb\u003e[country/region]\u003c/b\u003e is \u003cb\u003e[# of days]\u003c/b\u003e business days.\u003c/p\u003e\\n\u003cp\u003eShipping charges, if applicable, will be calculated and displayed at checkout. Please note that delivery times may vary depending on your location and the time of year.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eCurrently, we do not offer international shipping, but we are working to provide this service in the future.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eFor additional questions about our shipping policy, please contact us at \u003cb\u003e[email/phone #]\u003c/b\u003e.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003e\u003cb\u003e[International shipping included]\u003c/b\u003e\u003c/p\u003e\\n\u003cp\u003eOur standard shipping time within \u003cb\u003e[country/region]\u003c/b\u003e is \u003cb\u003e[# of days]\u003c/b\u003e business days.\u003c/p\u003e\\n\u003cp\u003eFor international orders, expect a shipping time of \u003cb\u003e[# of days]\u003c/b\u003e business days.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eShipping fees, if applicable, will be calculated and displayed at checkout. Please note that delivery times may vary depending on your location and the time of year.\u003c/p\u003e\\n\u003cbr/\u003e\\n\u003cp\u003eFor additional questions about our shipping policy, please contact us at \u003cb\u003e[email/phone #]\u003c/b\u003e.\u003c/p\u003e","articleTemplateShippingPolicyExcerpt":"\u003cp\u003eOur standard shipping time within \u003cb\u003e[country/region]\u003c/b\u003e is \u003cb\u003e[# of days]\u003c/b\u003e business days.\u003c/p\u003e\\n\u003cp\u003eShipping charges, if applicable, will be calculated and displayed at checkout. Please note that delivery times may vary depending on your location and the time of year.\u003c/p\u003e","articleTemplateShippingPolicyTitle":"What is your shipping policy?","articleTemplateSkipShipmentContent":"We are happy to assist with instructions on how to cancel your subscription.\u003cbr\u003e1. Login into your account \u003cstrong\u003e[Link to login page]\u003c/strong\u003e\u003cbr\u003e2. Click \u003cstrong\u003e[Subscriptions]\u003c/strong\u003e\u003cbr\u003e3. Locate your subscription and click \u003cstrong\u003e[Manage]\u003c/strong\u003e\u003cbr\u003e4. Click [Skip Shipment]. \u003cbr\u003eProceed to complete the steps to successfully cancel your subscription.","articleTemplateSkipShipmentExcerpt":"Learn how to skip a shipment in your subscription.","articleTemplateSkipShipmentTitle":"How do I skip a subscription shipment?","articleTemplateStartReturnContent":"Our return policy allows returns for \u003cstrong\u003e[condition of product (e.g. unopened)]\u003c/strong\u003e products purchased in the last \u003cstrong\u003e[X days]\u003c/strong\u003e. \u003cbr\u003eIf you'd like to proceed with a return, please visit our Return Portal \u003cstrong\u003e[link to return portal]\u003c/strong\u003e.\u003cbr\u003eOnce your request is approved, you will receive a prepaid return label via email. All returns must be approved and processed with our company-issued return shipping label to ensure proper tracking and processing of the return.\u003cbr\u003ePlease note that \u003cstrong\u003e[perishable / discounted / limited edition] \u003c/strong\u003eitems are not eligible for return.\u003cbr\u003eYou can expect your refund to be processed within \u003cstrong\u003e[X days]\u003c/strong\u003e business days or fewer after our returns department receives the return.","articleTemplateStartReturnExcerpt":"Learn how to start a return request.","articleTemplateStartReturnTitle":"How do I start a return?","articleTemplateTrackOrderContent":"Once your order has been placed and processed, you will receive a confirmation email with your order details. This email will include a tracking number and a link to our tracking page.\u003cbr\u003eTracking information may not be immediately available after your order is placed. It can take up to \u003cstrong\u003e[X days]\u003c/strong\u003e for the number to become active in our system. If you don't see any updates right away, please be patient and check back later.\u003cbr\u003e\u003cstrong\u003e[X days] \u003c/strong\u003eafter placing your order, you can click the tracking number link in the email or track your order on our website here [\u003cstrong\u003elink to Order Management: Track Order\u003c/strong\u003e].","articleTemplateTrackOrderExcerpt":"Learn how to track the status of your order after it's been placed.","articleTemplateTrackOrderTitle":"How do I track my order?","articleTemplateUpdateSubscriptionContent":"We are happy to assist with instructions on how to cancel your subscription.\u003cbr\u003e1. Login into your account  \u003cstrong\u003e[Link to login page]\u003c/strong\u003e\u003cbr\u003e2. Click \u003cstrong\u003e[Subscriptions]\u003c/strong\u003e\u003cbr\u003e3. Locate your subscription and click \u003cstrong\u003e[Manage]\u003c/strong\u003e\u003cbr\u003e4. Click \u003cstrong\u003e[Change Items]\u003c/strong\u003e. \u003cbr\u003eProceed to complete the steps to successfully cancel your subscription.","articleTemplateUpdateSubscriptionExcerpt":"Learn how to change the items in your subscription.","articleTemplateUpdateSubscriptionTitle":"How do I update my subscription items?","articleTemplateWorldwideShippingContent":"We do ship to most countries, however, there are a few that we are unable to send to. \u003cbr\u003eTo review the countries we currently don't ship to, please see below:\u003cbr\u003e\u003cstrong\u003e[Countries where you don’t ship.]\u003c/strong\u003e\u003cbr\u003ePlease note that international shipments can take \u003cstrong\u003e[X days]\u003c/strong\u003e. \u003cbr\u003eIf you have been waiting for more than \u003cstrong\u003e[X days] \u003c/strong\u003e to receive your order, please get in touch with our team to investigate the issue.","articleTemplateWorldwideShippingExcerpt":"Learn where we ship orders.","articleTemplateWorldwideShippingTitle":"Do you ship worldwide?","articleTemplateWrongItemContent":"We are sorry to hear you received the wrong item in your order! Please report your order issue to troke-width: 0px; white-space: pre-wrap; background-color: rgb(255, 255, 255); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;\" id=\"isPasted\"\u003e\u003cdiv data-block=\"true\" data-editor=\"9qorb\" data-offset-key=\"1hlk9-0-0\" style=\"box-sizing: border-box; -webkit-font-smoothing: antialiased; color: rgb(34, 34, 34); font-family: Inter, \u0026quot;Helvetica Neue\u0026quot;, Arial, Helvetica, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: start; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: pre-wrap; background-color: rgb(255, 255, 255); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;\"\u003e\u003cdiv data-block=\"true\" data-editor=\"9qorb\" data-offset-key=\"1hlk9-0-0\" style=\"box-sizing: border-box; -webkit-font-smoothing: antialiased; color: rgb(34, 34, 34); font-family: Inter, \u0026quot;Helvetica Neue\u0026quot;, Arial, Helvetica, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: start; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: pre-wrap; background-color: rgb(255, 255, 255); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;\"\u003e\u003ch2 data-offset-key=\"1hlk9-0-0\" id=\"1-accessingyour-subscription-account\"\u003e\u003cstrong\u003e1. Accessing\u0026#xA0;your subscription account\u003c/strong\u003e\u003c/h2\u003e\u003c/div\u003e\u003cdiv data-block=\"true\" data-editor=\"9qorb\" data-offset-key=\"75qt-0-0\" style=\"box-sizing: border-box; -webkit-font-smoothing: antialiased; color: rgb(34, 34, 34); font-family: Inter, \u0026quot;Helvetica Neue\u0026quot;, Arial, Helvetica, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: start; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: pre-wrap; background-color: rgb(255, 255, 255); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;\"\u003e\u003cp\u003eTo access your account, start by going to \u003ca href=\"https://puralux.nl\" rel=\"noopener noreferrer\" target=\"_blank\"\u003eour website\u003c/a\u003e and clicking on \u0026quot;\u003cstrong\u003eProfile Icon\u003c/strong\u003e\u0026quot; in the menu bar.\u0026#xA0;\u003cbr\u003e\u003cbr\u003e\u003cimg src=\"https://attachments.gorgias.help/3RBN0xMdzz749GJP/hc/JWjXVxGqML2DvMqm/2025093009-abf75a2f-e94e-425a-b2a1-2097acca68aa-3da2ede2-94a2-4d12-a25f-cd4dcdc57cb1.png\" style=\"width: 900px;\" class=\"fr-fic fr-dii fr-rounded fr-bordered\"\u003e\u003c/p\u003e\u003cp\u003eIf you haven\u0026apos;t created an account yet, choose \u0026quot;Create Account\u0026quot; and sign up using the email address associated with your order.\u0026#xA0;\u003c/p\u003e\u003ch2 id=\"2-managing-your-subscription\"\u003e\u003cstrong\u003e2. Managing your subscription\u0026#xA0;\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003eOnce logged in, go to \u0026#x201C;\u003cstrong\u003eOrders\u003c/strong\u003e\u0026#x201D;, select \u0026#x201C;\u003cstrong\u003eManage Subscription\u003c/strong\u003e\u0026#x201D;, and then click \u0026#x201C;\u003cstrong\u003eView Details\u003c/strong\u003e.\u0026#x201D;\u003c/p\u003e\u003cp data-offset-key=\"75qt-0-0\" style=\"box-sizing: border-box; -webkit-font-smoothing: antialiased; position: relative; white-space: pre-wrap; direction: ltr; text-align: left;\"\u003eHere, you can update your address or payment information, adjust the frequency or size of your order, skip an order, or cancel your subscription entirely.\u0026#xA0;\u003c/p\u003e\u003cp data-offset-key=\"75qt-0-0\" style=\"box-sizing: border-box; -webkit-font-smoothing: antialiased; position: relative; white-space: pre-wrap; direction: ltr; text-align: left;\"\u003eIf you find yourself with too many tablets but want to maintain your 10% discount, consider skipping an order or changing your order\u0026apos;s size or frequency to better match your needs.\u003cspan data-offset-key=\"2o59d-0-0\" style=\"box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: Arial, Helvetica, sans-serif; font-size: 16px;\"\u003e\u003cbr data-text=\"true\" style=\"box-sizing: border-box; -webkit-font-smoothing: antialiased;\"\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: 14px;\"\u003eFor questions or further assistance, please contact our support team\u0026#xA0;\u003c/span\u003e\u003cspan style=\"font-size: 14px;\"\u003e\u003ca href=\"https://help.puralux.nl/en-GB/contact\" rel=\"noopener noreferrer\" target=\"_blank\"\u003ehere\u003c/a\u003e\u003c/span\u003e\u003cspan style=\"font-size: 14px;\"\u003e.\u003c/span\u003e\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv data-block=\"true\" data-editor=\"9qorb\" data-offset-key=\"bbar2-0-0\" style=\"box-sizing: border-box; -webkit-font-smoothing: antialiased; color: rgb(34, 34, 34); font-family: Inter, \u0026quot;Helvetica Neue\u0026quot;, Arial, Helvetica, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: start; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: pre-wrap; background-color: rgb(255, 255, 255); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;\"\u003e\u003cbr\u003e\u003c/div\u003e","categoryId":null,"slug":"managing-your-subscription","lastUpdated":"2026-02-03T10:32:56.579Z","link":{"href":"/managing-your-subscription-959774"}},{"id":959773,"title":"Not Seeing Results From Your Dental pod?","description":"Unlock the full potential of your Dental pod with essential usage tips and tricks","htmlContent":"\u003cp id=\"isPasted\"\u003eIf you\u0026apos;ve been using the Dental pod and haven\u0026apos;t noticed the expected results, we understand your concern and are here to assist. Achieving the best results with your Dental pod involves understanding its functionality and proper usage techniques. Here are our top tips to ensure you get the most out of your device.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvery Oral Appliance is Different:\u003c/strong\u003e The effectiveness of the Dental pod against stains or grime build-up varies depending on the condition of the oral appliance. For some appliances, it might take a few weeks of consistent use to see a noticeable difference. We suggest using your Dental pod at least twice daily for optimal results. With regular use, you should begin to observe significant improvements.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProper Placement:\u003c/strong\u003e For the Dental pod to work effectively, it\u0026apos;s crucial that your oral appliance is fully submerged in the water. Improper placement, such as letting the device float or not eliminating air gaps, can significantly impact the cleaning process. If you cannot get your appliance to submerge fully, try running the cycle once, then flipping your appliance and running the cycle again to ensure thorough cleaning.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eScientific Assurance:\u003c/strong\u003e Even if the changes aren\u0026apos;t immediately visible to the naked eye, extensive research supports the efficacy of the Dental pod. \u003ca href=\"https://cdn-assets/s/files/1/0571/2281/6160/files/Bacteriostatic_poster_6.jpg?v=1706706010\u0026amp;ref=review\" rel=\"noopener noreferrer\" target=\"_blank\"\u003eOur own research\u003c/a\u003e has demonstrated its superior performance in eliminating bacteria, plaque, and pathogens compared to other cleaning methods. Additionally, \u003ca href=\"https://cdn-assets/s/files/1/0276/3453/2375/files/F22_poster_black.jpg?v=1704972993\u0026amp;ref=review\" rel=\"noopener noreferrer\" target=\"_blank\"\u003eindependent studies\u003c/a\u003e corroborate these findings, underscoring the Dental pod\u0026apos;s role in enhancing your oral health by keeping your appliance cleaner on a microscopic level.\u003c/p\u003e\u003cp\u003eWe hope these tips provide clarity and help improve your experience with the Dental pod. Should you have any more questions or require further assistance, please feel free to contact our support team using the link \u003ca href=\"https://help.puralux.nl/en-GB/contact\" rel=\"noopener noreferrer\" target=\"_blank\"\u003ehere\u003c/a\u003e.\u003c/p\u003e","categoryId":null,"slug":"not-seeing-results-from-your-dental-pod","lastUpdated":"2026-02-03T10:32:56.579Z","link":{"href":"/not-seeing-results-from-your-dental-pod-959773"}}],"allArticlesLink":{"href":"/articles"},"hasAllCategories":true,"hasAllArticles":true,"cachedCookies":{"cachedIsGridMode":null,"cachedSidebarOpened":null},"_sentryTraceData":"2d93dca38305428fb33ddfeae3b296ba-8e88aa3b0fe44e8f","_sentryBaggage":"sentry-environment=production,sentry-release=d61e5692063d7502fed356baa17d8080becd889a,sentry-public_key=339d07b3af324b43a69197fcfeeb4c08,sentry-trace_id=2d93dca38305428fb33ddfeae3b296ba,sentry-org_id=10734"},"__N_SSP":true},"page":"/","query":{},"buildId":"EGo3zlmfTpJ-qpYh5LzAJ","assetPrefix":"https://assets.gorgias.help/d61e5692063d7502fed356baa17d8080becd889a","runtimeConfig":{"environment":"production","chatSelfServicePortalApiUrl":"https://us-east1-898b.gorgias.chat","chatCdnBaseUrl":"https://config.gorgias.chat","recaptcha":{"disabled":false,"siteKey":"6LcIEKclAAAAANYKZuy20mvsprqiXITTJTMgCG-8"},"wo
